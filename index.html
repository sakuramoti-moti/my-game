<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>猫のアクションゲーム - 30ステージへの道</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui">
        <div>小判: <span id="coinCount">0</span> | 撃破: <span id="enemyCount">0</span></div>
        <div>スコア: <span id="totalScore">0</span></div>
    </div>
    <div id="stage-info">Stg <span id="currentLevel">1</span></div>
    <div id="btn-fs">全画面</div>
    <div id="msg">STAGE CLEAR!!</div>
    <div id="start-guide">画面をタップして開始</div>

    <div id="btn-left" class="btn">◀</div>
    <div id="btn-right" class="btn">▶</div>
    <div id="btn-jump" class="btn">JUMP</div>

    <canvas id="gameCanvas"></canvas>

    <script src="levels.js"></script>
    <script src="script.js"></script>
</body>
</html>
